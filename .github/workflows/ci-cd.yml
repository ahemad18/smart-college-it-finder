name: CI/CD Pipeline

permissions:
  contents: write

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ai-system-web/backend/requirements.txt
        pip install pytest pytest-cov
    
    - name: Run backend tests
      run: |
        if [ -f "pytest.ini" ] || find ai-system-web/backend -name "test_*.py" -o -name "*_test.py" | grep -q .; then
          pytest ai-system-web/backend/ -v --cov --cov-report=xml
        else
          echo "No tests found - skipping pytest"
        fi
      continue-on-error: true
    
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: always()
      continue-on-error: true

  frontend-build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Install dependencies
      run: |
        cd college-comparison-app
        npm install
    
    - name: Build frontend
      run: |
        cd college-comparison-app
        npm run build
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: college-comparison-app/dist/

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install pylint black flake8
    
    - name: Run black check
      run: black --check ai-system-web/backend/ || echo "Code formatting issues detected"
    
    - name: Run flake8
      run: flake8 ai-system-web/backend/ --max-line-length=120 --ignore=E203,W503 || echo "Linting issues detected"

  deploy-backend:
    needs: [backend-tests, frontend-build, code-quality]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Notify Render deployment
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
      run: |
        if [ ! -z "$RENDER_API_KEY" ] && [ ! -z "$RENDER_SERVICE_ID" ]; then
          echo "Triggering Render deployment..."
          curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" || echo "Deployment notification sent"
        else
          echo "Skipping auto-deployment (add RENDER_API_KEY and RENDER_SERVICE_ID secrets to enable)"
        fi

  deploy-frontend:
    needs: [frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4

    - name: Download frontend build artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: college-comparison-app/dist
    
    - name: Deploy frontend to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./college-comparison-app/dist
