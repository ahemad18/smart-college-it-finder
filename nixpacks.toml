[phases.setup]
nixPkgs = ["nodejs_20", "python311"]

[phases.install]
cmds = [
  "pip install -r ai-system-web/backend/requirements.txt",
  "cd college-comparison-app && npm install"
]

[phases.build]
cmds = [
  "cd college-comparison-app && npm run build"
]

[start]
cmd = "uvicorn ai-system-web.backend.app:app --host 0.0.0.0 --port $PORT"
