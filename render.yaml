services:
  - type: web
    name: smart-college-it-finder-backend
    env: python
    plan: free
    rootDir: ai-system-web/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
